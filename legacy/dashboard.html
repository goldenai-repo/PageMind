<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageMind — My Library</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    /* ── Base override (style.css centers body for login — reset here) ── */
    body {
      display: block;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Dashboard shell ───────────────────────────────────────── */
    .dash-layout {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── Sticky header ─────────────────────────────────────────── */
    .dash-header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 64px;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(27, 54, 93, 0.06);
    }

    .dash-nav {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.28rem 0.75rem 0.28rem 0.28rem;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      background: #fff;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--charcoal);
      user-select: none;
    }
    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--navy);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-signout {
      height: 34px;
      padding: 0 0.9rem;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: border-color var(--transition), color var(--transition);
    }
    .btn-signout:hover { border-color: var(--navy); color: var(--navy); }

    /* ── Main content area ─────────────────────────────────────── */
    .dash-main {
      flex: 1;
      padding: 2.5rem 2.5rem 4rem;
      max-width: 1360px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
    }

    /* ── Section header ────────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .section-title {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.4px;
      margin-bottom: 0.2rem;
      line-height: 1.2;
    }
    .section-sub {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .btn-upload {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      height: 42px;
      padding: 0 1.25rem;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(27, 54, 93, 0.30);
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }
    .btn-upload:hover {
      background: var(--navy-light);
      transform: translateY(-1px);
      box-shadow: 0 5px 18px rgba(27, 54, 93, 0.38);
    }
    .btn-upload:active { transform: translateY(0); }

    /* ── Library grid ──────────────────────────────────────────── */
    .library-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
      gap: 1.5rem;
    }

    /* ── Book card ─────────────────────────────────────────────── */
    .book-card {
      cursor: pointer;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--card);
      box-shadow: 0 2px 10px rgba(27, 54, 93, 0.07), 0 1px 3px rgba(0, 0, 0, 0.04);
      transition: transform var(--transition), box-shadow var(--transition);
      display: flex;
      flex-direction: column;
      outline: none;
    }
    .book-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(27, 54, 93, 0.15), 0 3px 8px rgba(0, 0, 0, 0.07);
    }
    .book-card:focus-visible {
      box-shadow: 0 0 0 3px rgba(27, 54, 93, 0.25);
    }
    .book-card:active { transform: translateY(-2px); }

    .book-cover {
      position: relative;
      height: 210px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    /* Shine overlay */
    .book-cover::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, transparent 55%);
      pointer-events: none;
    }
    .book-spine {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 13px;
      background: rgba(0, 0, 0, 0.22);
      border-right: 1px solid rgba(255, 255, 255, 0.07);
    }
    .book-cover__icon { opacity: 0.42; flex-shrink: 0; }
    .book-ext-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(6px);
      color: rgba(255, 255, 255, 0.92);
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.9px;
      padding: 3px 7px;
      border-radius: 4px;
    }

    .book-info {
      padding: 12px 15px 15px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .book-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--charcoal);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .book-meta {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Drag & drop overlay ───────────────────────────────────── */
    .drop-overlay {
      position: fixed;
      inset: 0;
      z-index: 900;
      background: rgba(27, 54, 93, 0.82);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
    }
    .drop-overlay.active { opacity: 1; pointer-events: auto; }
    .drop-overlay__text {
      font-size: 1.35rem;
      font-weight: 600;
      margin-top: 0.5rem;
    }
    .drop-overlay__sub { font-size: 0.88rem; opacity: 0.72; }

    /* ── Empty state ───────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 5rem 1rem;
      gap: 0.9rem;
    }
    .empty-state__icon { opacity: 0.18; margin-bottom: 0.4rem; }
    .empty-state__title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--charcoal);
    }
    .empty-state__sub {
      font-size: 0.87rem;
      color: var(--muted);
      max-width: 320px;
      line-height: 1.6;
    }
    .empty-state__cta {
      margin-top: 0.6rem;
      padding: 0.6rem 1.5rem;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(27, 54, 93, 0.28);
      transition: background var(--transition), transform var(--transition);
    }
    .empty-state__cta:hover {
      background: var(--navy-light);
      transform: translateY(-1px);
    }

    /* ── Reader panel ──────────────────────────────────────────── */
    .reader-panel {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      background: #eef0f4;
      transition: opacity 0.24s cubic-bezier(.4,0,.2,1), transform 0.24s cubic-bezier(.4,0,.2,1);
    }
    .reader-panel--hidden {
      opacity: 0;
      transform: translateY(18px);
      pointer-events: none;
    }

    .reader-header {
      flex-shrink: 0;
      height: 60px;
      padding: 0 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: #fff;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
    }

    .reader-back {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.87rem;
      font-weight: 500;
      color: var(--navy);
      cursor: pointer;
      padding: 0;
      white-space: nowrap;
      transition: opacity var(--transition);
    }
    .reader-back:hover { opacity: 0.65; }

    .reader-title-wrap {
      flex: 1;
      overflow: hidden;
      text-align: center;
    }
    .reader-book-title {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--charcoal);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .reader-controls {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-shrink: 0;
    }
    .ctrl-btn {
      width: 34px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--charcoal);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
      user-select: none;
    }
    .ctrl-btn:hover { background: #e2e8f0; border-color: #c0cad8; }
    .ctrl-btn:disabled { opacity: 0.4; cursor: default; }
    .font-size-val {
      font-size: 0.76rem;
      color: var(--muted);
      min-width: 34px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    /* ── Reader body — flex row: TOC | main ───────────────────── */
    .reader-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      background: #eef0f4;
    }

    /* ── TOC sidebar ───────────────────────────────────────────── */
    .toc-panel {
      width: 272px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #f5f7fb;
      border-right: 1px solid var(--border);
      overflow: hidden;
      transition: width 0.24s cubic-bezier(.4,0,.2,1);
    }
    .toc-panel.toc-hidden {
      width: 0;
      border-right: none;
    }
    .toc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1rem 1rem 1.25rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--navy);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: #fff;
    }
    .toc-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1;
      border-radius: 6px;
      transition: background var(--transition), color var(--transition);
    }
    .toc-close:hover { background: #eef0f6; color: var(--navy); }
    .toc-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0.6rem 0.65rem;
      margin: 0;
      scrollbar-width: thin;
      scrollbar-color: #c8d0de transparent;
    }
    .toc-list::-webkit-scrollbar { width: 3px; }
    .toc-list::-webkit-scrollbar-thumb { background: #c8d0de; border-radius: 3px; }
    .toc-item {
      list-style: none;
      margin-bottom: 1px;
    }
    .toc-link {
      display: block;
      padding: 0.52rem 0.85rem;
      font-size: 0.815rem;
      font-weight: 450;
      color: #4a5568;
      text-decoration: none;
      border-radius: 8px;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.14s ease, color 0.14s ease, box-shadow 0.14s ease;
    }
    .toc-link:hover {
      background: #e8edf8;
      color: var(--navy);
    }
    .toc-link.active {
      background: var(--navy);
      color: #fff;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(27,54,93,0.18);
    }

    /* ── Reader main: content + epub nav ───────────────────────── */
    .reader-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Scrollable content area (TXT & PDF) */
    .reader-content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 2.5rem 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: #c5cdd8 transparent;
    }
    .reader-content::-webkit-scrollbar { width: 6px; }
    .reader-content::-webkit-scrollbar-track { background: transparent; }
    .reader-content::-webkit-scrollbar-thumb { background: #c5cdd8; border-radius: 3px; }

    /* EPUB mode: let the viewer div manage its own scroll */
    .reader-content.is-epub { overflow: auto; padding: 1rem; }

    /* ── EPUB pagination footer ─────────────────────────────────── */
    .epub-nav {
      display: none;
      flex-shrink: 0;
      height: 58px;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      background: #fff;
      border-top: 1px solid var(--border);
    }
    .epub-nav.visible { display: flex; }

    .epub-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      height: 36px;
      padding: 0 1.1rem;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--navy);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }
    .epub-nav-btn:hover { background: #f0f4ff; border-color: var(--navy); transform: translateY(-1px); }
    .epub-nav-btn:disabled { opacity: 0.35; cursor: default; transform: none; }

    .epub-page-info {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      min-width: 100px;
      font-variant-numeric: tabular-nums;
    }

    /* TOC toggle button (shown only in EPUB) */
    .ctrl-btn.toc-toggle { display: none; }
    .ctrl-btn.toc-toggle.visible { display: flex; }

    /* ── TXT ───────────────────────────────────────────────────── */
    .reader-txt {
      max-width: 72ch;
      margin: 0 auto;
      padding: 3rem 3.5rem;
      background: #fff;
      border-radius: var(--radius-md);
      box-shadow: 0 2px 18px rgba(0, 0, 0, 0.08);
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.9;
      color: #2a3140;
      font-size: 18px;
      font-family: 'Inter', sans-serif;
      transition: font-size 0.15s;
    }

    /* ── PDF ───────────────────────────────────────────────────── */
    .pdf-page-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 1.75rem;
    }
    .pdf-page-wrapper canvas {
      display: block;
      max-width: 100%;
      border-radius: 4px;
      box-shadow: 0 4px 22px rgba(0, 0, 0, 0.15);
    }

    /* ── EPUB viewer — explicit block dimensions epub.js requires ── */
    #epub-viewer {
      width: 100%;
      height: 600px;
      overflow: auto;
      background: #fff;
      border-radius: var(--radius-md);
      box-shadow: 0 2px 18px rgba(0,0,0,0.08);
    }

    /* Loading */
    .reader-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 55vh;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .reader-spinner {
      width: 34px;
      height: 34px;
      border: 3px solid var(--border);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Error */
    .reader-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 40vh;
      gap: 0.6rem;
      color: var(--error);
      font-size: 0.9rem;
      text-align: center;
    }
    .reader-error small { color: var(--muted); font-size: 0.78rem; }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .dash-main { padding: 2rem 1.5rem 3rem; }
      .library-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1.1rem; }
      .book-cover { height: 175px; }
    }
    @media (max-width: 600px) {
      .dash-header { padding: 0 1rem; }
      .brand__tag, .user-chip span:not(.user-avatar) { display: none; }
      .dash-main { padding: 1.5rem 1rem 3rem; }
      .library-grid { grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 0.9rem; }
      .section-title { font-size: 1.25rem; }
      .reader-header { padding: 0 1rem; }
      .reader-back span { display: none; }
      .reader-txt { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>
  <!-- Decorative background orbs (shared with style.css) -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>

  <!-- Drag & drop overlay -->
  <div class="drop-overlay" id="dropOverlay" aria-hidden="true">
    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p class="drop-overlay__text">Drop to add to your library</p>
    <p class="drop-overlay__sub">PDF · EPUB · TXT</p>
  </div>

  <div class="dash-layout">

    <!-- ── Header ─────────────────────────────────────────────── -->
    <header class="dash-header">
      <div class="brand">
        <div class="brand__icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="3" y="2" width="16" height="22" rx="2" fill="#1B365D"/>
            <rect x="7" y="5" width="8"  height="1.5" rx="0.75" fill="#fff" opacity="0.7"/>
            <rect x="7" y="9" width="10" height="1.5" rx="0.75" fill="#fff" opacity="0.7"/>
            <rect x="7" y="13" width="6" height="1.5" rx="0.75" fill="#fff" opacity="0.7"/>
            <circle cx="21" cy="21" r="6" fill="#2E86AB"/>
            <path d="M18.5 21l2 2 3-3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="brand__name">PageMind</span>
        <span class="brand__tag">AI PDF Reader</span>
      </div>

      <nav class="dash-nav">
        <div class="user-chip" id="userChip">
          <div class="user-avatar" id="userAvatar">U</div>
          <span id="userName">User</span>
        </div>
        <button class="btn-signout" id="signOutBtn">Sign Out</button>
      </nav>
    </header>

    <!-- ── Main ───────────────────────────────────────────────── -->
    <main class="dash-main">

      <!-- Section header -->
      <div class="section-header">
        <div>
          <h2 class="section-title">My Library</h2>
          <p class="section-sub" id="bookCountLabel">No books yet</p>
        </div>
        <button class="btn-upload" id="uploadBtn" aria-label="Upload a book">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5"  y1="12" x2="19" y2="12"/>
          </svg>
          Upload Book
        </button>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <svg class="empty-state__icon" width="108" height="108" viewBox="0 0 24 24" fill="none" stroke="#1B365D" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <p class="empty-state__title">Your library is empty</p>
        <p class="empty-state__sub">Upload a PDF, EPUB, or TXT file to start building your personal reading collection.</p>
        <button class="empty-state__cta" id="emptyUploadBtn">Upload your first book</button>
      </div>

      <!-- Book grid -->
      <div class="library-grid" id="libraryGrid" role="list" aria-label="Book collection"></div>

    </main>
  </div>

  <!-- Hidden file input (supports multi-select) -->
  <input type="file" id="fileInput" accept=".pdf,.epub,.txt" multiple hidden aria-hidden="true" />

  <!-- ── Reader Panel ───────────────────────────────────────────── -->
  <div class="reader-panel reader-panel--hidden" id="readerPanel" role="dialog" aria-modal="true" aria-label="Book reader">
    <header class="reader-header">
      <button class="reader-back" id="closeReader" aria-label="Close reader and return to library">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>My Library</span>
      </button>

      <div class="reader-title-wrap">
        <span class="reader-book-title" id="readerTitle"></span>
      </div>

      <div class="reader-controls" aria-label="Reader controls">
        <button class="ctrl-btn toc-toggle" id="tocToggle" title="Toggle contents" aria-label="Toggle table of contents">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/></svg>
        </button>
        <div class="reader-controls-divider" style="width:1px;height:18px;background:var(--border);margin:0 0.2rem;"></div>
        <button class="ctrl-btn" id="fontDecrease" title="Decrease font size" aria-label="Decrease font size">A−</button>
        <span class="font-size-val" id="fontSizeVal" aria-live="polite">18px</span>
        <button class="ctrl-btn" id="fontIncrease" title="Increase font size" aria-label="Increase font size">A+</button>
      </div>
    </header>

    <!-- Reader body: TOC sidebar + scrollable content + epub nav -->
    <div class="reader-body">

      <!-- TOC sidebar (EPUB only) -->
      <aside class="toc-panel toc-hidden" id="tocPanel" aria-label="Table of contents">
        <div class="toc-header">
          <span>Contents</span>
          <button class="toc-close" id="tocClose" aria-label="Close contents">✕</button>
        </div>
        <ul class="toc-list" id="tocList" role="tree"></ul>
      </aside>

      <!-- Main reader area -->
      <div class="reader-main">
        <div class="reader-content" id="readerContent" tabindex="0"></div>

        <!-- EPUB prev / next footer (hidden for PDF & TXT) -->
        <div class="epub-nav" id="epubNav" aria-hidden="true">
          <button class="epub-nav-btn" id="prevPage" aria-label="Previous page">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Previous
          </button>
          <span class="epub-page-info" id="epubPageInfo" aria-live="polite"></span>
          <button class="epub-nav-btn" id="nextPage" aria-label="Next page">
            Next
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- JSZip: used directly for EPUB reading (epub.js dependency removed) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>

  <script src="dashboard.js?v=5"></script>
</body>
</html>
